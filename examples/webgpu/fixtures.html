<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Datoviz DRP2 WebGPU Fixture Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #111318;
      color: #f1f3f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111318;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      border-bottom: 1px solid #2a2f3a;
      background: #111318;
    }

    main {
      padding: 18px;
    }

    button {
      height: 32px;
      border: 1px solid #3a4252;
      border-radius: 4px;
      background: #1b2230;
      color: #f1f3f7;
      font: inherit;
      padding: 0 12px;
      cursor: pointer;
    }

    button:disabled {
      cursor: default;
      opacity: 0.6;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    section + section {
      margin-top: 28px;
    }

    h2 {
      margin: 0 0 8px;
      color: #e3e8f2;
      font-size: 15px;
      font-weight: 600;
    }

    .section-summary {
      margin: 0 0 10px;
      color: #cbd1dc;
      font-size: 13px;
    }

    th,
    td {
      padding: 8px 10px;
      border-bottom: 1px solid #2a2f3a;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #cbd1dc;
      font-weight: 600;
    }

    code {
      color: #9ec5ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
        monospace;
      font-size: 12px;
    }

    .status-pass {
      color: #9be59b;
    }

    .status-running {
      color: #f3d48b;
    }

    .status-pending {
      color: #8992a4;
    }

    .status-unsupported {
      color: #f5b971;
    }

    .status-fail {
      color: #ff8f8f;
    }

    #viewport {
      position: fixed;
      left: -4096px;
      top: 0;
      width: 64px;
      height: 64px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <strong>DRP2 WebGPU Fixture Dashboard</strong>
    <div>
      <span id="summary">Loading manifest</span>
      <button id="run-all" disabled>Run all</button>
    </div>
  </header>
  <main>
    <section>
      <h2>Fixture Compatibility</h2>
      <table>
        <thead>
          <tr>
            <th>Fixture</th>
            <th>Status</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="fixture-rows"></tbody>
      </table>
    </section>
    <section>
      <h2>Retained Runtime Stress</h2>
      <p id="stress-summary" class="section-summary">Loading runtime stress rows</p>
      <table>
        <thead>
          <tr>
            <th>Check</th>
            <th>Status</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="stress-rows"></tbody>
      </table>
    </section>
    <section>
      <h2>WASM Scene Smoke</h2>
      <p id="wasm-summary" class="section-summary">Loading WASM scene rows</p>
      <table>
        <thead>
          <tr>
            <th>Check</th>
            <th>Status</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="wasm-rows"></tbody>
      </table>
    </section>
  </main>
  <canvas id="viewport" width="64" height="64" aria-hidden="true"></canvas>
  <script type="module" src="./fixture_dashboard.js"></script>
</body>
</html>
