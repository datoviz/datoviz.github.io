<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Datoviz DRP2 WebGPU Triangle</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #111318;
      color: #f1f3f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: #111318;
    }

    header,
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 48px;
      padding: 10px 18px;
      border-color: #2a2f3a;
      color: #cbd1dc;
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      min-width: 0;
    }

    select,
    button {
      height: 30px;
      border: 1px solid #3a4252;
      border-radius: 4px;
      background: #171b23;
      color: #f1f3f7;
      font: inherit;
    }

    select {
      min-width: 220px;
      max-width: 36vw;
      padding: 0 8px;
    }

    button {
      min-width: 64px;
      padding: 0 10px;
      cursor: pointer;
    }

    button:disabled {
      cursor: default;
      opacity: 0.45;
    }

    header {
      border-bottom: 1px solid #2a2f3a;
    }

    footer {
      border-top: 1px solid #2a2f3a;
    }

    main {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    canvas {
      --stream-aspect: 1;
      width: min(80vw, calc((100vh - 144px) * var(--stream-aspect)), 720px);
      height: auto;
      max-width: calc(100vw - 48px);
      max-height: calc(100vh - 144px);
      aspect-ratio: var(--stream-aspect);
      background: #05070b;
      border: 1px solid #2d3442;
      display: block;
    }

    code {
      color: #9ec5ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
        monospace;
      font-size: 12px;
    }

    #status {
      color: #f3d48b;
      text-align: right;
    }

    #frame-info {
      min-width: 74px;
      color: #cbd1dc;
      text-align: right;
    }
  </style>
</head>
<body>
  <header>
    <strong>DRP2 WebGPU</strong>
    <div class="toolbar">
      <button id="play-toggle" type="button" disabled>Play</button>
      <span id="frame-info">0/0</span>
      <select id="stream-select" aria-label="DRP2 stream"></select>
      <code id="stream-name">streams/indexed_quad_wgsl.json</code>
    </div>
  </header>
  <main>
    <canvas id="viewport" aria-label="DRP2 WebGPU output"></canvas>
  </main>
  <footer>
    <span>Datoviz experimental WebGPU PoC</span>
    <span id="status">Starting</span>
  </footer>
  <script type="module" src="./stream_viewer.js"></script>
</body>
</html>
