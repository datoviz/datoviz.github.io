<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./loading.css">
    <title>Datoviz WebGPU Live Example</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101318;
        color: #eef1f4;
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        min-height: 0;
        height: 100vh;
        overflow: hidden;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto auto;
        background: #101318;
      }

      #limitations {
        display: flex;
        align-items: baseline;
        gap: 10px;
        padding: 7px 16px;
        border-top: 1px solid rgba(139, 148, 158, 0.35);
        background: rgba(139, 148, 158, 0.08);
        color: #aeb6c0;
        font-size: 12px;
        line-height: 1.4;
      }

      #limitations[hidden] {
        display: none;
      }

      #limitations strong {
        flex: 0 0 auto;
        color: #c7cdd4;
      }

      #limitation-list {
        display: flex;
        flex-wrap: wrap;
        gap: 4px 18px;
        margin: 0;
        padding-left: 18px;
      }

      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 48px;
        padding: 10px 16px;
        border-color: #2e3540;
        color: #c7cdd4;
        font-size: 13px;
        min-width: 0;
      }

      footer {
        border-top: 1px solid #2e3540;
      }

      #status {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-align: right;
      }

      #stage {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        display: grid;
        place-items: center;
      }

      #viewport {
        min-width: 0;
        min-height: 0;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        display: block;
        background: #05070a;
        touch-action: none;
        cursor: crosshair;
      }

      .error {
        color: #ff8d7d;
      }
    </style>
  </head>
  <body>
    <main id="stage">
      <canvas id="viewport"></canvas>
      <div id="network-loading" class="network-loading" role="status" aria-live="polite" hidden>
        <span data-loading-label>Preparing download…</span>
        <progress max="100" value="0" aria-label="Network download progress"></progress>
      </div>
    </main>
    <aside id="limitations" role="note" hidden>
      <strong>WebGPU rendering difference</strong>
      <ul id="limitation-list"></ul>
    </aside>
    <footer>
      <span id="stats"></span>
      <span id="status">Starting</span>
    </footer>
    <script type="module" src="./live.js"></script>
  </body>
</html>
