<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./loading.css">
    <title>Datoviz WebGPU Examples</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101318;
        color: #eef1f4;
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        min-height: 0;
        height: 100vh;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        background: #101318;
      }

      header,
      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 48px;
        padding: 10px 16px;
        border-color: #2e3540;
        color: #c7cdd4;
        font-size: 13px;
        min-width: 0;
      }

      header {
        border-bottom: 1px solid #2e3540;
      }

      footer {
        border-top: 1px solid #2e3540;
      }

      h1 {
        margin: 0;
        color: #f4f7fa;
        font-size: 15px;
        font-weight: 650;
      }

      select {
        min-width: 180px;
        height: 30px;
        padding: 0 8px;
        border: 1px solid #3a4252;
        border-radius: 4px;
        background: #171b23;
        color: #f1f3f7;
        font: inherit;
      }

      #status {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-align: right;
      }

      #stage {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        display: grid;
        place-items: center;
      }

      #viewport {
        min-width: 0;
        min-height: 0;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        display: block;
        background: #05070a;
        touch-action: none;
        cursor: crosshair;
      }

      .error {
        color: #ff8d7d;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Datoviz WebGPU Examples</h1>
      <select id="demo-select" aria-label="Example"></select>
    </header>
    <main id="stage">
      <canvas id="viewport"></canvas>
      <div id="network-loading" class="network-loading" role="status" aria-live="polite" hidden>
        <span data-loading-label>Preparing download…</span>
        <progress max="100" value="0" aria-label="Network download progress"></progress>
      </div>
    </main>
    <footer>
      <span id="stats"></span>
      <span id="status">Starting</span>
    </footer>
    <script type="module" src="./examples.js"></script>
  </body>
</html>
